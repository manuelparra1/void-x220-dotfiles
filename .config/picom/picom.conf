# =====================================================
# Picom Configuration for ThinkPad x220 (Intel HD 3000)
# Optimized for Void/Fedora Standard Repos
# =====================================================

# -- Backend & Performance --
backend = "glx";
vsync = true;

# Intel HD 3000 Specific Optimization
# This is crucial for Sandy Bridge. It boosts performance significantly.
glx-no-rebind-pixmap = true;
glx-no-stencil = true;

# -- Fading (The "Safe" Animation) --
# Since we can't use the 'animations' block on standard picom,
# we tune fading to feel like a smooth transition.
fading = true;
fade-delta = 4;        # Faster than 5, feels snappier
fade-in-step = 0.03;   # Smooth entry
fade-out-step = 0.03;  # Smooth exit
no-fading-openclose = false;

# -- Opacity Rules --
# Copied from your preference, but cleaned up
opacity-rule = [
  "100:window_type = 'dropdown_menu'",
  "100:window_type = 'popup_menu'",
  "100:window_type = 'menu'",
  "100:class_g = 'Rofi'",         # Ensure Launcher is bright
  "100:class_g = 'i3lock'",       # Ensure lockscreen is opaque
  "95:focused && !fullscreen",
  "85:!focused && !fullscreen",
  "100:fullscreen"
];

# -- Shadows --
# Enabled, but kept light for the x220 GPU
shadow = false;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.5;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g = 'Dunst'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c",
  "window_type = 'dock'",   # No shadow on i3bar
  "window_type = 'desktop'"
];

# -- Corners --
# 10px is fine on x220, but if you see lag, set this to 0
corner-radius = 15;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Dunst'"       # Let Dunst handle its own corners
];

# -- Blur --
# HARD STOP: Do not enable blur on ThinkPad x220.
# The Intel HD 3000 cannot handle 'dual_kawase' blur efficiently.
# It will make your window dragging laggy.
blur-background = false;

# -- General Settings --
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
use-ewmh-active-win = true;
detect-transient = true;
detect-client-leader = true;
use-damage = true;
log-level = "warn";

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.95; focus = true; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 1.0; }
  dropdown_menu = { opacity = 1.0; }
};
